<!DOCTYPE html>
<html lang="zh" data-theme="light" style="--rec-label: '★ 推荐'">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       TOKENS
       ============================================================ */
    :root {
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --surface-2: #F5F5F0;
      --surface-3: #EFEEE8;
      --text: #1A1A1A;
      --text-muted: #4A4A45;
      --text-subtle: #6B6B66;
      --accent: #D97757;
      --accent-hover: #C56843;
      --accent-soft: #FBEEE6;
      --accent-border: #F0D5C4;
      --accent-strong: #A85533;
      --border: #E5E4DC;
      --border-strong: #CDCDC4;
      --code-bg: #F5F2EC;
      --code-text: #2A2A2A;
      --info: #2563EB;
      --info-soft: #EFF6FF;
      --info-border: #BFDBFE;
      --warn: #B45309;
      --warn-soft: #FFFBEB;
      --warn-border: #FDE68A;
      --danger: #B91C1C;
      --danger-soft: #FEF2F2;
      --danger-border: #FECACA;
      --success: #047857;
      --success-soft: #ECFDF5;
      --success-border: #A7F3D0;
      --decision: #6D28D9;
      --decision-soft: #F5F3FF;
      --decision-border: #DDD6FE;
      --shadow-sm: 0 1px 2px rgba(20, 14, 8, 0.04);
      --shadow: 0 1px 2px rgba(20, 14, 8, 0.04), 0 4px 12px rgba(20, 14, 8, 0.06);
      --shadow-lg: 0 8px 24px rgba(20, 14, 8, 0.10);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --measure: 75ch;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Noto Sans CJK JP', 'Noto Sans CJK KR', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
      --z-progress: 200;
      --z-topbar: 100;
      --z-drawer: 300;
      --z-backdrop: 250;
    }

    [data-theme="dark"] {
      --bg: #1A1714;
      --surface: #221E1A;
      --surface-2: #2A2520;
      --surface-3: #322C26;
      --text: #F5F0E8;
      --text-muted: #C8C0B6;
      --text-subtle: #9A938A;
      --accent: #E89572;
      --accent-hover: #F2A87F;
      --accent-soft: #3A2A22;
      --accent-border: #5A3D2E;
      --accent-strong: #F5B493;
      --border: #2E2924;
      --border-strong: #463F38;
      --code-bg: #1E1B17;
      --code-text: #E8E2D8;
      --info: #93C5FD;
      --info-soft: #1E2A3D;
      --info-border: #2A4365;
      --warn: #FBBF24;
      --warn-soft: #332817;
      --warn-border: #5C4520;
      --danger: #FCA5A5;
      --danger-soft: #3A1F1F;
      --danger-border: #5C2A2A;
      --success: #6EE7B7;
      --success-soft: #1A3329;
      --success-border: #1F5C45;
      --decision: #C4B5FD;
      --decision-soft: #2A1F40;
      --decision-border: #4A3870;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    /* ============================================================
       BASE
       ============================================================ */
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s, color 0.2s;
    }
    ::selection { background: var(--accent-soft); color: var(--accent-strong); }

    /* Skip link */
    .skip-link {
      position: absolute;
      top: -100px; left: 8px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius-sm);
      font-weight: 500;
      z-index: 1000;
      transition: top 0.15s;
    }
    .skip-link:focus { top: 8px; }

    /* SVG sprite container (hidden) */
    .icon-sprite { position: absolute; width: 0; height: 0; overflow: hidden; }
    .icon { display: inline-block; flex-shrink: 0; vertical-align: middle; stroke: currentColor; fill: none; }

    /* Scroll progress bar */
    .scroll-progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      z-index: var(--z-progress);
      transition: width 0.05s linear;
    }

    /* ============================================================
       TOPBAR
       ============================================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: var(--z-topbar);
      background: rgba(250, 250, 247, 0.85);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="dark"] .topbar { background: rgba(26, 23, 20, 0.85); }
    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
    }
    .brand-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      animation: brand-pulse 2.8s ease-in-out infinite;
    }
    @keyframes brand-pulse {
      0%, 100% { box-shadow: 0 0 0 4px var(--accent-soft); }
      50%      { box-shadow: 0 0 0 7px transparent; }
    }
    .topbar-actions { display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background-color 0.15s;
      padding: 0;
    }
    .icon-btn .icon { width: 18px; height: 18px; stroke-width: 2; }
    .icon-btn[hidden] { display: none; }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .layout {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 48px;
      padding: 32px 24px 96px;
    }
    .content { min-width: 0; }
    /* Unified reading measure: every top-level block shares one width so
       paragraphs, callouts, diagrams, timelines, tables and code align to a
       single clean column. Opt out with .full-bleed where truly needed. */
    .content > * { max-width: var(--measure); }
    .content > .full-bleed { max-width: none; }

    /* ============================================================
       TOC (desktop + mobile drawer)
       ============================================================ */
    .toc {
      position: sticky;
      top: 80px;
      align-self: start;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      padding-right: 8px;
    }
    .toc::-webkit-scrollbar { width: 6px; }
    .toc::-webkit-scrollbar-track { background: transparent; }
    .toc::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    .toc-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px 12px;
    }
    .toc-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-subtle);
      margin: 0;
    }
    .toc-close { display: none; }
    .toc-nav { display: flex; flex-direction: column; gap: 2px; }
    .toc-nav a {
      display: flex; align-items: center;
      min-height: 36px;
      padding: 8px 14px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13.5px;
      border-left: 2px solid transparent;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      transition: color 0.15s, background-color 0.15s, border-color 0.15s;
      line-height: 1.4;
    }
    .toc-nav a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--accent-soft);
      font-weight: 500;
    }
    .toc-nav a.lvl-3 { padding-left: 26px; font-size: 12.5px; }
    .toc-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: var(--z-backdrop);
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* ============================================================
       DOC HEADER
       ============================================================ */
    .doc-header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .doc-eyebrow {
      display: inline-flex; align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      border: 1px solid var(--accent-border);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .doc-title {
      font-size: clamp(28px, 3vw + 16px, 40px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      color: var(--text);
      text-wrap: balance;
    }
    .doc-subtitle {
      font-size: clamp(15px, 0.6vw + 13px, 18px);
      color: var(--text-muted);
      line-height: 1.55;
      margin: 0 0 20px;
      max-width: var(--measure);
      text-wrap: pretty;
    }
    .doc-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 13px;
      color: var(--text-subtle);
    }
    .doc-meta-item { display: inline-flex; align-items: center; gap: 6px; }
    .doc-meta .icon { width: 14px; height: 14px; stroke-width: 2; }

    /* ============================================================
       CONTENT (typography)
       ============================================================ */
    .content h1, .content h2, .content h3, .content h4 {
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -0.01em;
      scroll-margin-top: 80px;
      text-wrap: balance;
    }
    .content h2 {
      font-size: 26px;
      font-weight: 600;
      margin: 56px 0 16px;
      padding-top: 8px;
      position: relative;
    }
    .content h3 {
      font-size: 19px;
      font-weight: 600;
      margin: 36px 0 12px;
      position: relative;
    }
    .content h4 {
      font-size: 13px;
      font-weight: 600;
      margin: 24px 0 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .content > p,
    .content > ul,
    .content > ol,
    .content > blockquote { max-width: var(--measure); }
    .content p { margin: 0 0 16px; text-wrap: pretty; overflow-wrap: anywhere; }
    .content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-border); }
    .content ul, .content ol { padding-left: 24px; margin: 0 0 16px; }
    .content li { margin: 4px 0; }
    .content strong { color: var(--text); font-weight: 600; }
    .content em { color: var(--text-muted); }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    /* Anchor links injected by JS on h2/h3 with id */
    .anchor {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      margin-left: 6px;
      color: var(--text-subtle);
      opacity: 0;
      transform: translateY(-1px);
      transition: opacity 0.15s, color 0.15s;
      border-bottom: none !important;
      border-radius: var(--radius-sm);
    }
    .anchor .icon { width: 14px; height: 14px; stroke-width: 2; }

    /* Images */
    .content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin: 20px 0;
      display: block;
    }
    .content figure { margin: 20px 0; }
    .content figure img { margin: 0; }
    .content figcaption {
      font-size: 13px;
      color: var(--text-subtle);
      margin-top: 8px;
      text-align: center;
    }

    /* Task lists (- [ ] / - [x]) */
    .content .task-list-item { list-style: none; margin-left: -22px; }
    .content .task-list-item-checkbox {
      margin-right: 8px;
      vertical-align: -2px;
      accent-color: var(--accent);
    }

    /* Footnotes */
    .content .footnote-ref a,
    .content sup a {
      font-size: 0.75em;
      vertical-align: super;
      border-bottom: none;
      padding: 0 2px;
    }
    .content .footnotes {
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ============================================================
       CODE
       ============================================================ */
    .content code {
      font-family: var(--font-mono);
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      color: var(--code-text);
      border: 1px solid var(--border);
      overflow-wrap: anywhere;
    }
    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      font-size: 13.5px;
      line-height: 1.6;
      margin: 16px 0;
      position: relative;
    }
    .content pre code {
      background: none; padding: 0; border: none;
      color: var(--code-text);
      font-size: inherit;
    }
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-subtle);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
      padding: 0;
    }
    .copy-btn .icon { width: 14px; height: 14px; stroke-width: 2; }
    .copy-btn.copied { color: var(--success); border-color: var(--success-border); opacity: 1; }

    /* ============================================================
       TIMELINE / STEPS
       ============================================================ */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin: 20px 0;
      position: relative;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 19px;
      top: 16px;
      bottom: 16px;
      width: 2px;
      background: linear-gradient(180deg, var(--accent-border), var(--border));
    }
    .step {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 16px;
      align-items: start;
      padding: 8px 4px;
      position: relative;
      border-radius: var(--radius);
      transition: background-color 0.15s;
    }
    .step-num {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--accent);
      border-radius: 50%;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
      position: relative;
      z-index: 1;
      transition: background-color 0.15s, color 0.15s, transform 0.15s;
    }
    .step.done .step-num { background: var(--accent); color: #fff; }
    .step-body { padding-top: 6px; min-width: 0; }
    .step-body h3 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 600;
    }
    .step-body p { margin: 0 0 8px; color: var(--text-muted); font-size: 14.5px; max-width: var(--measure); }
    .step-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11.5px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ============================================================
       CALLOUTS
       ============================================================ */
    .callout {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 14px;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 1px solid;
      margin: 20px 0;
      font-size: 14.5px;
      line-height: 1.6;
      max-width: var(--measure);
    }
    .callout-icon { width: 20px; height: 20px; margin-top: 2px; stroke-width: 2; }
    .callout-body { min-width: 0; }
    .callout-title { font-weight: 600; margin: 0 0 4px; font-size: 14px; }
    .callout-body p:last-child { margin-bottom: 0; }
    .callout-body code { background: rgba(0,0,0,0.04); }
    [data-theme="dark"] .callout-body code { background: rgba(255,255,255,0.06); }

    .callout-info     { background: var(--info-soft);     border-color: var(--info-border);     color: var(--text); }
    .callout-info     .callout-title, .callout-info     .callout-icon { color: var(--info); }
    .callout-warn     { background: var(--warn-soft);     border-color: var(--warn-border);     color: var(--text); }
    .callout-warn     .callout-title, .callout-warn     .callout-icon { color: var(--warn); }
    .callout-danger   { background: var(--danger-soft);   border-color: var(--danger-border);   color: var(--text); }
    .callout-danger   .callout-title, .callout-danger   .callout-icon { color: var(--danger); }
    .callout-success  { background: var(--success-soft);  border-color: var(--success-border);  color: var(--text); }
    .callout-success  .callout-title, .callout-success  .callout-icon { color: var(--success); }
    .callout-decision { background: var(--decision-soft); border-color: var(--decision-border); color: var(--text); }
    .callout-decision .callout-title, .callout-decision .callout-icon { color: var(--decision); }
    .callout-tip      { background: var(--accent-soft);   border-color: var(--accent-border);   color: var(--text); }
    .callout-tip      .callout-title, .callout-tip      .callout-icon { color: var(--accent-strong); }

    /* ============================================================
       KEY-POINT HIGHLIGHT
       ============================================================ */
    .highlight {
      background: linear-gradient(135deg, var(--accent-soft), var(--surface-2));
      border-left: 4px solid var(--accent);
      padding: 18px 22px;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 24px 0;
      font-size: 16px;
      line-height: 1.65;
      max-width: var(--measure);
    }
    .highlight-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-strong);
      margin-bottom: 6px;
    }

    /* ============================================================
       MERMAID
       ============================================================ */
    .diagram {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin: 24px 0;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }
    .diagram-caption {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
      font-size: 13px;
      color: var(--text-subtle);
      text-align: center;
    }
    .mermaid { text-align: center; min-height: 80px; }
    .mermaid svg { max-width: 100%; height: auto; }
    .mermaid:not([data-processed]) {
      opacity: 0.4;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-subtle);
      white-space: pre-wrap;
      text-align: left;
    }

    /* ============================================================
       PROS / CONS
       ============================================================ */
    .proscons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    .proscons-col {
      padding: 16px 20px;
      border-radius: var(--radius);
      border: 1px solid;
    }
    .proscons-col h4 {
      margin: 0 0 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 8px;
    }
    .proscons-col ul { margin: 0; padding-left: 18px; }
    .proscons-col li { margin: 6px 0; }
    .pros { background: var(--success-soft); border-color: var(--success-border); }
    .pros h4 { color: var(--success); }
    .cons { background: var(--danger-soft); border-color: var(--danger-border); }
    .cons h4 { color: var(--danger); }

    /* ============================================================
       COMPARISON CARDS
       ============================================================ */
    .compare {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin: 24px 0;
    }
    .compare-card {
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.18s, box-shadow 0.18s;
      position: relative;
    }
    .compare-card.recommended { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .compare-card.recommended::before {
      content: var(--rec-label, "★ Recommended");
      position: absolute; top: -10px; right: 14px;
      background: var(--accent); color: #fff;
      padding: 2px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .compare-card h4 { margin: 0 0 8px; font-size: 15px; color: var(--text); text-transform: none; letter-spacing: normal; }
    .compare-card p { margin: 0; color: var(--text-muted); font-size: 14px; }

    /* ============================================================
       COLLAPSIBLE
       ============================================================ */
    details.collapsible {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 16px 0;
      background: var(--surface);
      overflow: hidden;
    }
    details.collapsible[open] { box-shadow: var(--shadow-sm); }
    details.collapsible > summary {
      cursor: pointer;
      padding: 14px 18px;
      font-weight: 500;
      color: var(--text);
      list-style: none;
      display: flex; align-items: center; gap: 10px;
      user-select: none;
      transition: background 0.15s;
      min-height: 44px;
    }
    details.collapsible > summary::-webkit-details-marker { display: none; }
    details.collapsible > summary::before {
      content: "›";
      display: inline-block;
      transition: transform 0.18s;
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
    }
    details.collapsible[open] > summary::before { transform: rotate(90deg); }
    .collapsible-body { padding: 4px 18px 18px; border-top: 1px solid var(--border); }
    .collapsible-body > *:first-child { margin-top: 12px; }

    /* ============================================================
       TABLES (wrapped via .table-wrap or naturally responsive)
       ============================================================ */
    .table-wrap {
      overflow-x: auto;
      margin: 20px 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      max-width: 100%;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--surface);
      margin: 0;
    }
    /* Standalone tables (not inside .table-wrap) keep visual border */
    .content > table {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 20px 0;
      display: block;
      overflow-x: auto;
    }
    .content th {
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .content td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      vertical-align: top;
    }
    .content tr:last-child td { border-bottom: none; }

    /* ============================================================
       BLOCKQUOTE
       ============================================================ */
    .content blockquote {
      margin: 20px 0;
      padding: 4px 20px;
      border-left: 3px solid var(--accent-border);
      color: var(--text-muted);
      font-style: italic;
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    .doc-footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-subtle);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .doc-footer a { color: var(--accent); text-decoration: none; }

    /* ============================================================
       FOCUS-VISIBLE (a11y)
       ============================================================ */
    *:focus { outline: none; }
    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }
    .toc-nav a:focus-visible { outline-offset: -2px; }
    .icon-btn:focus-visible { outline-offset: 2px; }
    .anchor:focus-visible { opacity: 1; outline-offset: 2px; }
    details.collapsible > summary:focus-visible { outline-offset: -2px; }

    /* ============================================================
       HOVER (only on hover-capable devices to avoid sticky-tap on mobile)
       ============================================================ */
    @media (hover: hover) {
      .back-to-top:hover { color: var(--accent); border-color: var(--accent-border); background: var(--accent-soft); }
      .icon-btn:hover { color: var(--accent); border-color: var(--accent-border); background: var(--accent-soft); }
      .toc-nav a:hover { color: var(--accent); background: var(--accent-soft); }
      .content a:hover { color: var(--accent-hover); border-bottom-color: var(--accent); }
      .compare-card:hover { border-color: var(--accent-border); box-shadow: var(--shadow); }
      .compare-card.recommended:hover { border-color: var(--accent); }
      .content tr:hover td { background: var(--surface-2); }
      details.collapsible > summary:hover { background: var(--surface-2); }
      .step:hover { background: var(--surface-2); }
      .step:hover .step-num { transform: scale(1.05); }
      .anchor:hover { color: var(--accent); }
      .content h2:hover .anchor,
      .content h3:hover .anchor { opacity: 1; }
      .copy-btn:hover { color: var(--accent); border-color: var(--accent-border); }
      .content pre:hover .copy-btn { opacity: 1; }
    }
    /* On touch devices, copy-btn is always visible at low opacity */
    @media (hover: none) {
      .copy-btn { opacity: 0.6; }
      .anchor { opacity: 0.4; }
    }

    /* ============================================================
       MOBILE (≤900px) — TOC becomes off-canvas drawer
       ============================================================ */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 20px 16px 80px;
      }
      .topbar-inner { padding: 8px 12px; }
      .doc-header { margin-bottom: 28px; padding-bottom: 20px; }

      .toc-mobile-trigger { display: inline-flex !important; }

      .toc {
        position: fixed;
        top: 0; left: 0;
        width: min(300px, 82vw);
        height: 100dvh;
        max-height: 100dvh;
        background: var(--surface);
        z-index: var(--z-drawer);
        padding: 16px 8px 24px 16px;
        box-shadow: var(--shadow-lg);
        transform: translateX(-105%);
        transition: transform 0.25s ease;
      }
      .toc-head { padding: 4px 4px 12px 8px; }
      .toc-close {
        display: inline-flex !important;
        width: 36px; height: 36px;
        align-items: center; justify-content: center;
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        color: var(--text-muted);
        cursor: pointer;
        padding: 0;
      }
      .toc-close .icon { width: 18px; height: 18px; stroke-width: 2; }
      body.toc-open .toc { transform: translateX(0); }
      body.toc-open .toc-backdrop {
        display: block;
        opacity: 1;
      }
      .toc-backdrop {
        display: block;
        opacity: 0;
        pointer-events: none;
      }
      body.toc-open .toc-backdrop { pointer-events: auto; }
      body.toc-open { overflow: hidden; }
    }
    @media (min-width: 901px) {
      .toc-mobile-trigger { display: none !important; }
    }

    /* ============================================================
       REDUCED MOTION (a11y)
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      html { scroll-behavior: auto; }
      .brand-dot { animation: none; box-shadow: 0 0 0 4px var(--accent-soft); }
    }

    /* ============================================================
       LAYER HEADINGS (对谈三层结构)
       ============================================================ */
    .layer-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
    }
    .layer-heading::before {
      flex-shrink: 0;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .layer-insight::before {
      content: "洞察";
      background: var(--accent-soft);
      color: var(--accent-strong);
      border: 1px solid var(--accent-border);
    }
    .layer-analysis::before {
      content: "解析";
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .layer-dialogue::before {
      content: "实录";
      background: var(--info-soft);
      color: var(--info);
      border: 1px solid var(--info-border);
    }
    .layer-insight { font-size: 0; }
    .layer-insight::before { font-size: 11px; }
    .layer-insight .anchor { font-size: 14px; }
    .layer-analysis { font-size: 0; }
    .layer-analysis::before { font-size: 11px; }
    .layer-analysis .anchor { font-size: 14px; }
    .layer-dialogue { font-size: 0; }
    .layer-dialogue::before { font-size: 11px; }
    .layer-dialogue .anchor { font-size: 14px; }
    .section-insight { margin-top: 12px; margin-bottom: 20px; }
    .section-insight .callout-body p { margin: 0; }

    /* Section jump pills (injected by JS) */
    .section-jump {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: -4px 0 20px;
      max-width: var(--measure);
    }
    .section-jump a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 4px 12px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      transition: color 0.15s, border-color 0.15s, background-color 0.15s;
    }
    .section-jump a:hover,
    .section-jump a:focus-visible {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-soft);
    }

    /* Speaker differentiation in dialogue timeline */
    .step.speaker-host .step-num {
      border-color: var(--info);
      color: var(--info);
      background: var(--info-soft);
    }
    .step.speaker-guest .step-num {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .step.speaker-host .step-body h3 { color: var(--info); }
    .step.speaker-guest .step-body h3 { color: var(--accent-strong); }

    /* Meta panel + table URL wrap */
    .meta-panel { margin-bottom: 32px; }
    .toc-nav .toc-meta-link {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
      color: var(--text-subtle);
      font-size: 12.5px;
    }
    .table-wrap td a { word-break: break-all; }

    /* Back to top */
    .back-to-top {
      position: fixed;
      right: 20px;
      bottom: 24px;
      z-index: 90;
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: opacity 0.2s, transform 0.2s, color 0.15s, border-color 0.15s;
      padding: 0;
    }
    .back-to-top .icon { width: 20px; height: 20px; stroke-width: 2; }
    .back-to-top:not([hidden]) { opacity: 1; transform: translateY(0); }
    .back-to-top[hidden] { display: inline-flex; opacity: 0; pointer-events: none; transform: translateY(8px); }

    /* ============================================================
       PRINT
       ============================================================ */
    @media print {
      .topbar, .toc, .toc-backdrop, .icon-btn, .copy-btn, .anchor, .scroll-progress, .back-to-top, .section-jump { display: none !important; }
      .layout { grid-template-columns: 1fr; padding: 0; max-width: 100%; }
      body { background: #fff; color: #000; }
      a { color: #000; }
      .content pre, .callout, .compare-card, .step, .diagram { break-inside: avoid; }
      .doc-footer { break-before: avoid; }
    }
  </style>
</head>
<body>

    <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
  </svg>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <button class="icon-btn toc-mobile-trigger" id="toc-toggle" onclick="openToc()" aria-label="目录" title="目录">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-menu"/></svg>
        </button>
        <span class="brand-dot" aria-hidden="true"></span>
        <span>笔记</span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="window.print()" title="打印 / 保存 PDF" aria-label="打印 / 保存 PDF">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-printer"/></svg>
        </button>
        <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use id="theme-icon-use" href="#i-moon"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- TOC drawer backdrop (mobile) -->
  <div class="toc-backdrop" id="toc-backdrop" onclick="closeToc()" aria-hidden="true"></div>

  <div class="layout">
    <aside class="toc" id="toc" aria-label="目录">
      <div class="toc-head">
        <p class="toc-title">目录</p>
        <button class="toc-close" onclick="closeToc()" aria-label="关闭">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-x"/></svg>
        </button>
      </div>
      <nav class="toc-nav" id="toc-nav">
{{TOC}}
      </nav>
    </aside>

    <main class="content" id="main">
      <header class="doc-header">
        <span class="doc-eyebrow">{{EYEBROW}}</span>
        <h1 class="doc-title">{{TITLE}}</h1>
        <p class="doc-subtitle">{{SUBTITLE}}</p>
        <div class="doc-meta">
          <span class="doc-meta-item">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-file"/></svg>
            {{META_SOURCE}}
          </span>
          <span class="doc-meta-item">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-calendar"/></svg>
            {{META_DATE}}
          </span>
          <span class="doc-meta-item">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-clock"/></svg>
            {{META_READTIME}}
          </span>
        </div>
      </header>

      <!-- CONTENT_START -->
{{CONTENT}}
      <!-- CONTENT_END -->

      <footer class="doc-footer">
        <span>Generated by md2html · <a href="{{SOURCE_URL}}" target="_blank" rel="noopener">观看原视频</a></span>
        <span>来源: {{SOURCE_FILE}}</span>
      </footer>
    </main>
  </div>

  <button type="button" class="back-to-top" id="back-to-top" aria-label="回到顶部" title="回到顶部" hidden>
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-arrow-up"/></svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    // ---------- Theme ----------
    const STORAGE_KEY = "md2html-theme";
    function currentTheme() { return document.documentElement.dataset.theme || "light"; }
    function applyThemeIcon() {
      const use = document.getElementById("theme-icon-use");
      if (use) use.setAttribute("href", currentTheme() === "dark" ? "#i-sun" : "#i-moon");
    }
    (function restoreTheme() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        document.documentElement.dataset.theme = saved;
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.dataset.theme = "dark";
      }
    })();

    // ---------- Mermaid ----------
    const diagramSources = new Map();
    function initMermaid() {
      const isDark = currentTheme() === "dark";
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark ? "dark" : "default",
        themeVariables: {
          primaryColor: isDark ? "#3A2A22" : "#FBEEE6",
          primaryTextColor: isDark ? "#F5F0E8" : "#1A1A1A",
          primaryBorderColor: isDark ? "#E89572" : "#D97757",
          lineColor: isDark ? "#9A938A" : "#6B6B66",
          secondaryColor: isDark ? "#2A2520" : "#F5F5F0",
          tertiaryColor: isDark ? "#221E1A" : "#FFFFFF",
          fontFamily: "Inter, system-ui, sans-serif",
        },
      });
    }
    async function renderMermaid() {
      initMermaid();
      const els = document.querySelectorAll(".mermaid");
      els.forEach(el => {
        if (!diagramSources.has(el)) diagramSources.set(el, el.textContent.trim());
        el.textContent = diagramSources.get(el);
        el.removeAttribute("data-processed");
      });
      try { await mermaid.run({ nodes: els }); } catch (e) { console.error(e); }
    }
    function toggleTheme() {
      const next = currentTheme() === "light" ? "dark" : "light";
      document.documentElement.dataset.theme = next;
      localStorage.setItem(STORAGE_KEY, next);
      applyThemeIcon();
      renderMermaid();
    }

    // ---------- TOC drawer (mobile) ----------
    const tocEl = () => document.getElementById("toc");
    const tocToggle = () => document.getElementById("toc-toggle");
    const isMobileToc = () => window.matchMedia("(max-width: 900px)").matches;

    function syncTocA11y(open) {
      const toc = tocEl();
      if (!toc) return;
      if (isMobileToc()) {
        toc.setAttribute("role", "dialog");
        toc.setAttribute("aria-modal", open ? "true" : "false");
        toc.setAttribute("aria-hidden", open ? "false" : "true");
      } else {
        toc.removeAttribute("role");
        toc.removeAttribute("aria-modal");
        toc.removeAttribute("aria-hidden");
      }
    }

    function openToc() {
      document.body.classList.add("toc-open");
      syncTocA11y(true);
      const closeBtn = tocEl()?.querySelector(".toc-close");
      closeBtn?.focus();
    }
    function closeToc() {
      document.body.classList.remove("toc-open");
      syncTocA11y(false);
      if (isMobileToc()) tocToggle()?.focus();
    }
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && document.body.classList.contains("toc-open")) closeToc();
    });
    window.addEventListener("resize", () => {
      if (!document.body.classList.contains("toc-open")) syncTocA11y(false);
    });

    // ---------- TOC scrollspy ----------
    function setupTocSpy() {
      const links = Array.from(document.querySelectorAll("#toc-nav a[href^='#']"));
      if (!links.length) {
        const toc = document.getElementById("toc");
        if (toc) toc.style.display = "none";
        return;
      }
      const entries = [];
      links.forEach(a => {
        const id = a.getAttribute("href").slice(1);
        const el = document.getElementById(id);
        if (el) entries.push({ el, link: a });
        a.addEventListener("click", () => {
          if (isMobileToc()) closeToc();
        });
      });

      let ticking = false;
      const setActive = () => {
        ticking = false;
        const offset = 96;
        let current = entries[0]?.link;
        for (const { el, link } of entries) {
          if (el.getBoundingClientRect().top <= offset) current = link;
        }
        links.forEach(l => l.classList.toggle("active", l === current));
      };
      const onScroll = () => {
        if (!ticking) {
          ticking = true;
          requestAnimationFrame(setActive);
        }
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      setActive();
    }

    // ---------- Section jump pills ----------
    function injectSectionJumps() {
      document.querySelectorAll(".content h2[id]").forEach(h2 => {
        const id = h2.id;
        const parts = [
          { suffix: "-insight", label: "洞察" },
          { suffix: "-analysis", label: "解析" },
          { suffix: "-dialogue", label: "实录" },
        ];
        const items = parts
          .map(p => ({ el: document.getElementById(id + p.suffix), label: p.label }))
          .filter(x => x.el);
        if (!items.length) return;
        const nav = document.createElement("nav");
        nav.className = "section-jump";
        nav.setAttribute("aria-label", "本节导航");
        items.forEach(({ el, label }) => {
          const a = document.createElement("a");
          a.href = "#" + el.id;
          a.textContent = label;
          nav.appendChild(a);
        });
        h2.insertAdjacentElement("afterend", nav);
      });
    }

    // ---------- Speaker tags in dialogue ----------
    function tagSpeakers() {
      document.querySelectorAll(".timeline .step-body h3").forEach(h3 => {
        const step = h3.closest(".step");
        if (!step) return;
        const name = h3.textContent.trim();
        if (/Harrison/i.test(name)) step.classList.add("speaker-host");
        else if (/Andrew/i.test(name)) step.classList.add("speaker-guest");
      });
    }

    // ---------- Anchor links on h2/h3 ----------
    function injectAnchors() {
      document.querySelectorAll(".content h2[id], .content h3[id]").forEach(h => {
        if (h.querySelector(".anchor")) return;
        const a = document.createElement("a");
        a.className = "anchor";
        a.href = "#" + h.id;
        a.setAttribute("aria-label", "段落链接");
        a.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-link"/></svg>';
        h.appendChild(a);
      });
    }

    // ---------- Copy-to-clipboard on <pre> ----------
    function injectCopyButtons() {
      document.querySelectorAll(".content pre").forEach(pre => {
        if (pre.classList.contains("mermaid")) return;
        if (pre.querySelector(".copy-btn")) return;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "copy-btn";
        btn.setAttribute("aria-label", "复制代码");
        btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-copy"/></svg>';
        btn.addEventListener("click", async () => {
          const code = pre.querySelector("code")?.textContent ?? pre.textContent;
          try {
            await navigator.clipboard.writeText(code);
            btn.classList.add("copied");
            btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-check"/></svg>';
            setTimeout(() => {
              btn.classList.remove("copied");
              btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-copy"/></svg>';
            }, 1500);
          } catch (e) { console.error(e); }
        });
        pre.appendChild(btn);
      });
    }

    // ---------- Back to top ----------
    function setupBackToTop() {
      const btn = document.getElementById("back-to-top");
      if (!btn) return;
      const toggle = () => {
        btn.hidden = window.scrollY < 480;
      };
      btn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      window.addEventListener("scroll", toggle, { passive: true });
      toggle();
    }

    // ---------- Scroll progress ----------
    function setupScrollProgress() {
      const bar = document.getElementById("scroll-progress");
      if (!bar) return;
      const onScroll = () => {
        const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const p = h > 0 ? (document.documentElement.scrollTop / h * 100) : 0;
        bar.style.width = p + "%";
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    }

    // ---------- Boot ----------
    document.addEventListener("DOMContentLoaded", () => {
      applyThemeIcon();
      syncTocA11y(false);
      tagSpeakers();
      injectAnchors();
      injectCopyButtons();
      renderMermaid();
      setupTocSpy();
      setupScrollProgress();
      setupBackToTop();
    });
  </script>
</body>
</html>
